name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging
          - dev
      tag:
        description: 'Test tag to run'
        required: true
        default: '@smoke'
        type: choice
        options:
          - '@smoke'
          - '@regression'
          - '@ui'
          - '@api'

jobs:
  api-tests:
    name: API Tests
    if: github.event.inputs.tag != '@ui'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        id: tests
        run: npx playwright test --project=api-web --grep "${{ github.event.inputs.tag || '@smoke' }}"
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'prod' }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f "test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.skipped' test-results/results.json)
            PASSED=$(jq '.stats.expected' test-results/results.json)
            FAILED=$(jq '.stats.unexpected' test-results/results.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "API Tests: ${{ steps.tests.outcome }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Playwright — API Tests* ${{ steps.tests.outcome == 'success' && '✅' || '❌' }}\n\n*Status:* ${{ steps.tests.outcome }}\n*Environment:* ${{ github.event.inputs.environment || 'prod' }}\n*Tag:* ${{ github.event.inputs.tag || '@smoke' }}\n*Branch:* ${{ github.head_ref || github.ref_name }}\n\n*Total:* ${{ steps.results.outputs.total }} | *Passed:* ${{ steps.results.outputs.passed }} | *Failed:* ${{ steps.results.outputs.failed }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts|HTML Report>"
                  }
                }
              ]
            }

  e2e-tests:
    name: E2E Tests (${{ matrix.project }})
    if: github.event.inputs.tag != '@api'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    strategy:
      fail-fast: false
      matrix:
        project: [firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run E2E tests
        id: tests
        run: npx playwright test --project=${{ matrix.project }} --workers=1 --grep "${{ github.event.inputs.tag || '@smoke' }}"
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'prod' }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f "test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.skipped' test-results/results.json)
            PASSED=$(jq '.stats.expected' test-results/results.json)
            FAILED=$(jq '.stats.unexpected' test-results/results.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "E2E Tests (${{ matrix.project }}): ${{ steps.tests.outcome }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Playwright — E2E Tests (${{ matrix.project }})* ${{ steps.tests.outcome == 'success' && '✅' || '❌' }}\n\n*Status:* ${{ steps.tests.outcome }}\n*Environment:* ${{ github.event.inputs.environment || 'prod' }}\n*Tag:* ${{ github.event.inputs.tag || '@smoke' }}\n*Branch:* ${{ github.head_ref || github.ref_name }}\n\n*Total:* ${{ steps.results.outputs.total }} | *Passed:* ${{ steps.results.outputs.passed }} | *Failed:* ${{ steps.results.outputs.failed }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts|HTML Report>"
                  }
                }
              ]
            }
